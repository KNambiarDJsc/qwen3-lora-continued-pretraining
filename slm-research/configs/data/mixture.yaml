# Mixture strategy — see architecture spec Section 4 and 7 (open decision #1, #3).
# Decision: weighted proportional interleaving, packed within-dataset before mixing.
#
# 8 sources, not the originally-planned 10: daily_dialog and eli5 were dropped
# (2026-07-04) because they no longer load with current `datasets` versions —
# daily_dialog only ships a legacy loading script (removed support, no Parquet
# auto-conversion available per HF's datasets-server `is-valid` check), and
# eli5 was pulled from the Hub entirely (huggingface.co/datasets/eli5 now
# resolves to an unrelated user profile, not the dataset). See
# docs/dataset_guide.md for detail. Neither is a config/code bug on this
# repo's side — the datasets themselves are gone/broken upstream.

sampling_strategy: proportional_interleave   # alternative: epoch_balanced
packing_granularity: within_dataset          # alternative: across_mixture
sequence_length: 2048

sources:
  - name: wikitext
    config: wikitext-103-raw-v1
    weight: null        # all null → derive proportionally from sample_count
    sample_count: all
  - name: openwebtext
    weight: null
    sample_count: 100000
    streaming: true
  - name: bookcorpusopen
    weight: null
    sample_count: 80000
    streaming: true
  - name: tinystories
    weight: null
    sample_count: 80000
  - name: ag_news
    weight: null
    sample_count: all
  - name: cnn_dailymail
    config: "3.0.0"
    weight: null
    sample_count: 30000
  - name: xsum
    weight: null
    sample_count: 30000
  - name: fineweb_edu
    weight: null
    sample_count: 100000
    streaming: true
